<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300&display=swap" rel="stylesheet">

<!-- Link external CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>💍 You're Invited 💍</h1>
  <p>We invite you to celebrate our special day and share in our joy.</p>

  <a href="/assets/invitation-card.pdf" download class="glass-btn" aria-label="Download invitation card">
    💌 Download Invitation
  </a>
</div>

<button class="music-btn" onclick="toggleMusic()" aria-label="Toggle background music">🎵</button>

<audio id="bgMusic" loop>
  <source src="/assets/music.mp3" type="audio/mpeg">
</audio>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Three.js Scene Setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 5;

// Load petal texture
const textureLoader = new THREE.TextureLoader();
const petalTexture = textureLoader.load('/assets/petal.png');

const petals = [];
const PETAL_COUNT = window.innerWidth < 480 ? 60 : 120;

// Create petals with random properties
for(let i=0;i<PETAL_COUNT;i++){
  const geometry = new THREE.PlaneGeometry(0.5,0.5);
  const material = new THREE.MeshBasicMaterial({map:petalTexture, transparent:true});
  const petal = new THREE.Mesh(geometry, material);

  petal.position.x = (Math.random()-0.5)*10;
  petal.position.y = Math.random()*6;
  petal.position.z = (Math.random()-0.5)*5;

  // Random speed & rotation
  petal.userData = {
    speedY: 0.005 + Math.random()*0.015,
    rotationSpeedZ: 0.005 + Math.random()*0.02,
    sway: (Math.random()-0.5) * 0.02 // side-to-side sway
  };

  scene.add(petal);
  petals.push(petal);
}

// Animate petals
function animate(){
  requestAnimationFrame(animate);

  petals.forEach(petal => {
    petal.position.y -= petal.userData.speedY;
    petal.rotation.z += petal.userData.rotationSpeedZ;
    petal.position.x += Math.sin(petal.position.y * 2) * petal.userData.sway;

    if(petal.position.y < -3) {
      petal.position.y = 3;
      petal.position.x = (Math.random()-0.5)*10;
    }
  });

  renderer.render(scene,camera);
}
animate();

// Responsive
window.addEventListener('resize', ()=>{
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// Music toggle with emoji change
const music = document.getElementById("bgMusic");
const musicBtn = document.querySelector('.music-btn');

function toggleMusic(){
  if(music.paused){
    music.play();
    musicBtn.textContent = "🎶";
  }else{
    music.pause();
    musicBtn.textContent = "🎵";
  }
}

// Optional: auto pause on blur
window.addEventListener('blur', ()=> music.pause());
window.addEventListener('focus', ()=> {
  if(!music.paused) music.play();
});
</script>

</body>
</html>
